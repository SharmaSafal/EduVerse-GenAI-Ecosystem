<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduVerse | Strategic Orchestrator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            margin: 0; 
            padding: 20px; 
            color: #f8fafc;
            height: calc(100vh - 40px);
            overflow-y: auto;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .dashboard { 
            display: flex; 
            gap: 30px; 
            max-width: 1300px; 
            margin: auto; 
            align-items: flex-start;
        }
        
        /* Glass Panel Base */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 30px;
        }

        /* --- Left Panel (Control Center) --- */
        .input-panel { 
            flex: 1; 
            min-width: 380px; 
            position: sticky;
            top: 20px;
        }

        .panel-header {
            margin: 0 0 20px 0;
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(to right, #06b6d4, #3b82f6);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        label { 
            display: block; color: #94a3b8; font-size: 12px; font-weight: 700; 
            margin-top: 20px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
        }

        input[type=text], input[type=date] { 
            width: 100%; padding: 14px 18px; background: rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; 
            color: white; font-family: 'Inter', sans-serif; font-size: 15px;
            box-sizing: border-box; transition: 0.3s;
        }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }
        input:focus { outline: none; border-color: #06b6d4; background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1); }

        .btn-primary { 
            margin-top: 25px; width: 100%; padding: 16px; 
            background: linear-gradient(135deg, #06b6d4, #3b82f6); color: white; 
            border: none; border-radius: 12px; cursor: pointer; font-size: 16px; 
            font-weight: 700; transition: 0.3s; box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(6, 182, 212, 0.5); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: #cbd5e1; box-shadow: none; border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

        /* --- Dynamic Topic Selector --- */
        #topic-selection-stage { display: none; animation: fadeIn 0.4s ease-out; }
        
        .topic-group { margin-bottom: 20px; }
        .topic-group h4 { margin: 0 0 10px 0; font-size: 14px; color: #e2e8f0; display: flex; align-items: center; gap: 8px; }
        
        /* Difficulty Badges */
        .lvl-badge { padding: 3px 8px; border-radius: 8px; font-size: 10px; text-transform: uppercase; font-weight: 800; }
        .lvl-Beginner { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .lvl-Intermediate { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .lvl-Advanced { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

        .topic-item {
            display: flex; align-items: center; padding: 12px 15px; 
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s;
        }
        .topic-item:hover { background: rgba(6, 182, 212, 0.1); border-color: rgba(6, 182, 212, 0.3); }
        .topic-item input[type="checkbox"] { margin-right: 12px; accent-color: #06b6d4; width: 16px; height: 16px; cursor: pointer; }
        .topic-name { font-size: 14px; color: #cbd5e1; flex: 1; }

        .custom-topic-adder { display: flex; gap: 10px; margin-top: 20px; }
        
        /* --- Right Panel (The Schedule Timeline) --- */
        .schedule-panel { flex: 2; min-width: 500px; display: flex; flex-direction: column; gap: 20px; }

        .summary-card { 
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(59, 130, 246, 0.1));
            border: 1px solid rgba(6, 182, 212, 0.3); padding: 25px; border-radius: 20px; 
            display: flex; align-items: center; gap: 20px; animation: slideUp 0.5s ease-out;
        }

        .countdown-number { font-size: 48px; font-weight: 800; color: #22d3ee; line-height: 1; text-shadow: 0 0 20px rgba(34, 211, 238, 0.4); }
        .summary-text h2 { margin: 0 0 5px 0; font-size: 18px; color: #f8fafc; }
        .summary-text p { margin: 0; font-size: 14px; color: #94a3b8; }
        
        /* Rich Timeline Cards */
        .day-card { 
            background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 25px; border-radius: 16px; animation: slideUp 0.5s ease-out backwards;
            position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 15px;
        }
        .day-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: linear-gradient(to bottom, #06b6d4, #3b82f6); }
        .day-card.review-day::before { background: linear-gradient(to bottom, #f59e0b, #ef4444); }

        .day-header { font-size: 18px; font-weight: 800; color: #e2e8f0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;}
        .date-subtext { color: #64748b; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}

        /* Deep Task Modules */
        .task-module { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.02); border-radius: 12px; padding: 20px; }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .task-title { font-size: 16px; font-weight: 700; color: #f8fafc; }
        
        .task-metrics { display: flex; gap: 15px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.1); }
        .metric { font-size: 12px; color: #94a3b8; display: flex; align-items: center; gap: 5px; font-weight: 600; }
        .metric-icon { color: #06b6d4; }

        .strategy-text { font-size: 14px; color: #cbd5e1; line-height: 1.6; }

        .empty-state { text-align: center; color: #64748b; margin-top: 100px; }

        /* Loader */
        .loader-small { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="dashboard">
        
        <div class="glass-panel input-panel">
            <h3 class="panel-header">Learning Orchestrator</h3>
            
            <div id="config-stage">
                <label>Target Subject / Exam</label>
                <input type="text" id="subject-input" placeholder="e.g., Python, DSA, Discrete Math" autocomplete="off">
                
                <label>Examination Date</label>
                <input type="date" id="date-input">
                
                <button type="button" class="btn-primary" id="btn-analyze" style="display: flex; justify-content: center; gap: 10px; align-items: center;">
                    <span>Map Knowledge Graph</span>
                    <div class="loader-small" id="loader-analyze"></div>
                </button>
            </div>

            <div id="topic-selection-stage">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <span style="color: #06b6d4; font-size: 12px; font-weight: 800; text-transform: uppercase;">Topics Extracted</span>
                    <button type="button" class="btn-secondary" style="padding: 5px 10px; font-size: 10px; border-radius: 5px;" onclick="resetForm()">Reset</button>
                </div>

                <div id="topics-container">
                    </div>

                <div class="custom-topic-adder">
                    <input type="text" id="custom-topic-input" placeholder="Add missing topic..." style="padding: 10px; font-size: 13px;">
                    <button type="button" class="btn-secondary" style="width: auto; padding: 0 15px;" onclick="addCustomTopic()">Add</button>
                </div>
                
                <button type="button" class="btn-primary" id="btn-generate" style="display: flex; justify-content: center; gap: 10px; align-items: center;">
                    <span>Compile Master Strategy</span>
                    <div class="loader-small" id="loader-generate"></div>
                </button>
            </div>
        </div>

        <div class="schedule-panel" id="timeline-container">
            <div class="empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 15px;">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
                <h3 style="color: #94a3b8; margin: 0;">System Standby</h3>
                <p style="color: #64748b; margin-top: 10px;">Enter your subject parameters to map a neural learning pathway.</p>
            </div>
        </div>

    </div>

    <script>
        let currentSubject = "";
        let currentDate = "";

        // UI Elements
        const configStage = document.getElementById('config-stage');
        const topicStage = document.getElementById('topic-selection-stage');
        const topicsContainer = document.getElementById('topics-container');
        const timelineContainer = document.getElementById('timeline-container');

        // Step 1: Map Knowledge Graph
        document.getElementById('btn-analyze').addEventListener('click', async () => {
            const subject = document.getElementById('subject-input').value.trim();
            const date = document.getElementById('date-input').value;

            if(!subject || !date) { alert("Provide subject and date."); return; }

            currentSubject = subject;
            currentDate = date;

            document.getElementById('loader-analyze').style.display = 'block';

            try {
                const response = await fetch('/api/get_topics', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ subject: subject })
                });
                
                const data = await response.json();
                renderTopics(data.syllabus);
                
                // Transition UI
                configStage.style.display = 'none';
                topicStage.style.display = 'block';

            } catch (error) {
                console.error("API Error:", error);
            } finally {
                document.getElementById('loader-analyze').style.display = 'none';
            }
        });

        // Render the Checkboxes
        function renderTopics(syllabus) {
            topicsContainer.innerHTML = '';
            
            for (const [level, topics] of Object.entries(syllabus)) {
                if (topics.length === 0) continue;
                
                let groupHtml = `<div class="topic-group">
                    <h4><span class="lvl-badge lvl-${level}">${level}</span></h4>`;
                
                topics.forEach(topic => {
                    groupHtml += `
                        <label class="topic-item">
                            <input type="checkbox" class="topic-checkbox" value="${topic}" data-level="${level}" checked>
                            <span class="topic-name">${topic}</span>
                        </label>`;
                });
                
                groupHtml += `</div>`;
                topicsContainer.insertAdjacentHTML('beforeend', groupHtml);
            }
        }

        // Add Custom Topic
        function addCustomTopic() {
            const input = document.getElementById('custom-topic-input');
            const val = input.value.trim();
            if(!val) return;

            const html = `
                <label class="topic-item" style="border-color: #06b6d4;">
                    <input type="checkbox" class="topic-checkbox" value="${val}" data-level="Intermediate" checked>
                    <span class="topic-name">${val} <span style="color:#06b6d4; font-size:10px; margin-left:5px;">(Custom)</span></span>
                </label>`;
            
            // Append to the last group or create a new one, for simplicity just append to container
            topicsContainer.insertAdjacentHTML('beforeend', html);
            input.value = '';
        }

        // Reset
        function resetForm() {
            topicStage.style.display = 'none';
            configStage.style.display = 'block';
            timelineContainer.innerHTML = `<div class="empty-state">...</div>`; // Reset right panel
        }

        // Step 2: Compile Strategy
        document.getElementById('btn-generate').addEventListener('click', async () => {
            
            // Gather selected topics
            const selectedBoxes = document.querySelectorAll('.topic-checkbox:checked');
            const selectedTopics = Array.from(selectedBoxes).map(box => ({
                name: box.value,
                level: box.getAttribute('data-level')
            }));

            if(selectedTopics.length === 0) { alert("Select at least one topic."); return; }

            document.getElementById('loader-generate').style.display = 'block';

            try {
                const response = await fetch('/api/generate_plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        subject: currentSubject,
                        exam_date: currentDate,
                        topics: selectedTopics
                    })
                });
                
                const data = await response.json();
                
                if(data.error) {
                    alert(data.error);
                    return;
                }

                renderTimeline(data);

            } catch (error) {
                console.error("API Error:", error);
            } finally {
                document.getElementById('loader-generate').style.display = 'none';
            }
        });

        // Render the Massive Detailed Timeline
        function renderTimeline(data) {
            let html = `
                <div class="summary-card">
                    <div class="countdown-number">${data.days_left}</div>
                    <div class="summary-text">
                        <h2>Days Until Exam</h2>
                        <p>Neural pathway mapped. Execute the modules below to guarantee mastery.</p>
                    </div>
                </div>
            `;

            data.schedule.forEach((day, index) => {
                const isReview = day.is_review ? 'review-day' : '';
                
                html += `
                    <div class="day-card ${isReview}" style="animation-delay: ${index * 0.1}s;">
                        <div class="day-header">
                            <span>Day ${day.day_num}</span>
                            <span class="date-subtext">${day.date}</span>
                        </div>
                `;

                day.tasks.forEach(task => {
                    const badgeClass = `lvl-${task.level}`;
                    
                    html += `
                        <div class="task-module">
                            <div class="task-header">
                                <span class="task-title">${task.topic}</span>
                                <span class="lvl-badge ${badgeClass}">${task.level}</span>
                            </div>
                            <div class="strategy-text">${task.strategy}</div>
                            
                            <div class="task-metrics">
                                <div class="metric"><span class="metric-icon">🕒</span> ${task.time} Focused Block</div>
                                <div class="metric"><span class="metric-icon">🎯</span> Active Recall Applied</div>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            timelineContainer.innerHTML = html;
        }
    </script>
</body>
</html>
