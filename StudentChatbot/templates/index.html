<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduVerse | Neural Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap');
        
        /* Transparent body to blend with the Master Portal */
        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent; 
            margin: 0;
            padding: 20px;
            height: calc(100vh - 40px);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
        }

        /* The Glassmorphism Container */
        .chat-wrapper {
            width: 100%;
            max-width: 900px;
            height: 95%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Sleek Header */
        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .bot-avatar-head {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .chat-header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chat-header p { margin: 0; font-size: 12px; color: #94a3b8; font-weight: 500; }

        /* Scrollable Chat Area */
        .chat-display {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Chat Bubbles */
        .msg-row { display: flex; width: 100%; animation: slideUp 0.4s ease-out forwards; opacity: 0; transform: translateY(10px); }
        .msg-row.user-row { justify-content: flex-end; }
        .msg-row.bot-row { justify-content: flex-start; align-items: flex-end; gap: 10px;}

        .bubble {
            max-width: 75%;
            padding: 16px 20px;
            font-size: 15px;
            line-height: 1.6;
            letter-spacing: 0.2px;
        }

        .user-bubble {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .bot-bubble {
            background: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px 20px 20px 4px;
        }

        .bot-icon-small {
            width: 28px;
            height: 28px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-bottom: 5px;
        }

        /* Input Area (Separated from messages) */
        .input-area {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        form {
            display: flex;
            gap: 15px;
            position: relative;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 25px;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        input[type="text"]::placeholder {
            color: #64748b;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 0 30px;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Simple greeting state if no conversation has started */
        .empty-state {
            text-align: center;
            color: #64748b;
            margin-top: auto;
            margin-bottom: auto;
        }
    </style>
</head>
<body>

    <div class="chat-wrapper">
        <div class="chat-header">
            <div class="bot-avatar-head">🤖</div>
            <div>
                <h1>EduVerse AI</h1>
                <p>System Online & Ready</p>
            </div>
        </div>

        <div class="chat-display" id="chat-box">
            
            {% if not user_input %}
                <div class="empty-state">
                    <h3>Hello! I am your AI Assistant.</h3>
                    <p>Ask me a question to begin.</p>
                </div>
            {% endif %}

            {% if user_input %}
                <div class="msg-row user-row">
                    <div class="bubble user-bubble">
                        {{ user_input }}
                    </div>
                </div>
            {% endif %}

            {% if bot_response %}
                <div class="msg-row bot-row" style="animation-delay: 0.2s;">
                    <div class="bot-icon-small">🤖</div>
                    <div class="bubble bot-bubble">
                        {{ bot_response }}
                    </div>
                </div>
            {% endif %}

        </div>

        <div class="input-area">
            <form method="POST">
                <input type="text" name="user_input" placeholder="Type your message..." required autocomplete="off" autofocus>
                <button type="submit">
                    Send
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        chatBox.scrollTop = chatBox.scrollHeight;
    </script>

</body>
</html>
